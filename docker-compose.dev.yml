services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "54328:5432"
    environment:
      POSTGRES_DB: system_design_sandbox_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d system_design_sandbox_dev"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data

volumes:
  dev-postgres-data:
